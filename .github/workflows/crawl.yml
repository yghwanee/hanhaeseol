name: Crawl Schedules

on:
  schedule:
    # KST 08:18 = UTC 23:18 (하루 1회)
    - cron: '18 23 * * *'
  workflow_dispatch: {} # 수동 트리거

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run crawl
        env:
          COUPANG_CT_LSID: ${{ secrets.COUPANG_CT_LSID }}
          COUPANG_DEVICE_ID: ${{ secrets.COUPANG_DEVICE_ID }}
          COUPANG_MEMBER_SRL: ${{ secrets.COUPANG_MEMBER_SRL }}
          COUPANG_PROFILE_ID: ${{ secrets.COUPANG_PROFILE_ID }}
          COUPANG_TOKEN: ${{ secrets.COUPANG_TOKEN }}

      - name: Commit & Push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/schedule.json
          if git diff --staged --quiet; then
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update schedule data"
            git pull --rebase origin main
            git push
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Telegram 알림
        if: steps.commit.outputs.updated == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="✅ 한해설 편성표가 업데이트되었습니다." \
            -d parse_mode=HTML
