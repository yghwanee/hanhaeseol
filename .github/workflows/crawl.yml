name: Crawl Schedules

on:
  schedule:
    # KST 08:18 = UTC 23:18 (하루 1회)
    - cron: '18 23 * * *'
  workflow_dispatch: {} # 수동 트리거

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run crawl
        env:
          COUPANG_CT_LSID: ${{ secrets.COUPANG_CT_LSID }}
          COUPANG_DEVICE_ID: ${{ secrets.COUPANG_DEVICE_ID }}
          COUPANG_MEMBER_SRL: ${{ secrets.COUPANG_MEMBER_SRL }}
          COUPANG_PROFILE_ID: ${{ secrets.COUPANG_PROFILE_ID }}
          COUPANG_TOKEN: ${{ secrets.COUPANG_TOKEN }}

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/schedule.json
          git diff --staged --quiet || git commit -m "chore: update schedule data"
          git pull --rebase origin main
          git push
