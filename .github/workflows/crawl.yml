name: Crawl Schedules

on:
  schedule:
    # KST 08:18 = UTC 23:18 (하루 1회)
    - cron: '18 23 * * *'
  workflow_dispatch: {}  # 수동 트리거

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - run: npm ci

      - name: Run crawl
        id: crawl
        run: |
          npm run crawl 2>&1 | tee crawl.log
          if grep -q "쿠팡플레이: 토큰 갱신 실패" crawl.log; then
            echo "coupang_failed=true" >> $GITHUB_OUTPUT
          else
            echo "coupang_failed=false" >> $GITHUB_OUTPUT
          fi
        env:
          COUPANG_CT_LSID: ${{ secrets.COUPANG_CT_LSID }}
          COUPANG_DEVICE_ID: ${{ secrets.COUPANG_DEVICE_ID }}
          COUPANG_MEMBER_SRL: ${{ secrets.COUPANG_MEMBER_SRL }}
          COUPANG_PROFILE_ID: ${{ secrets.COUPANG_PROFILE_ID }}
          COUPANG_TOKEN: ${{ secrets.COUPANG_TOKEN }}
          COUPANG_P_AT: ${{ secrets.COUPANG_P_AT }}

      - name: Install curl-impersonate (Chrome TLS fingerprint for Cloudflare bypass)
        run: |
          curl -sL -o /tmp/ci.tgz https://github.com/lexiforest/curl-impersonate/releases/download/v1.5.5/curl-impersonate-v1.5.5.x86_64-linux-gnu.tar.gz
          sudo tar -xzf /tmp/ci.tgz -C /usr/local/bin/
          sudo chmod +x /usr/local/bin/curl-impersonate /usr/local/bin/curl_chrome* /usr/local/bin/curl_firefox* /usr/local/bin/curl_safari* /usr/local/bin/curl_edge*
          curl_chrome131 -sL -o /dev/null -w "smoke test: %{http_code}\n" https://example.com/

      - name: Run analysis crawl
        env:
          CRAWLER_IMPERSONATE_CMD: curl_chrome131
        run: npm run crawl:analysis

      - name: Commit & Push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/schedule.json public/schedule.json src/data/analysis.json public/analysis.json
          if git diff --staged --quiet; then
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update schedule data"
            git pull --rebase origin main
            git push
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Telegram 알림 (성공)
        if: steps.commit.outputs.updated == 'true' && steps.crawl.outputs.coupang_failed == 'false'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="✅ 한해설 편성표가 업데이트되었습니다." \
            -d parse_mode=HTML

      - name: Telegram 알림 (쿠팡플레이 토큰 만료)
        if: steps.crawl.outputs.coupang_failed == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG=$(printf '%s\n' \
            "🚨 쿠팡플레이 토큰 만료" \
            "" \
            "기존 데이터로 유지 중이지만, 새 경기 정보를 가져오지 못합니다." \
            "" \
            "토큰 갱신 방법" \
            "1. coupangplay.com 로그인" \
            "2. F12 → Application → Cookies" \
            "" \
            "COUPANG_P_AT → P_AT 쿠키 값" \
            "COUPANG_CT_LSID → CT_LSID 쿠키 값" \
            "COUPANG_TOKEN → token 쿠키 값" \
            "COUPANG_DEVICE_ID → device_id 쿠키 값" \
            "COUPANG_MEMBER_SRL → member_srl 쿠키 값" \
            "" \
            "GitHub Secrets 업데이트 (필수)" \
            "https://github.com/yghwanee/hanhaeseol/settings/secrets/actions" \
            "" \
            "업데이트 후 Actions에서 Run workflow로 수동 실행해주세요.")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}"
