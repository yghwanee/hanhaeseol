name: Crawl Schedules

on:
  schedule:
    # KST 01시, 05시, 11시, 17시, 22시 = UTC 16, 20, 02, 08, 13시
    - cron: '0 16,20,2,8,13 * * *'
  workflow_dispatch: {} # 수동 트리거

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run crawl

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/schedule.json
          git pull --rebase origin main
          git diff --staged --quiet || git commit -m "chore: update schedule data"
          git push
