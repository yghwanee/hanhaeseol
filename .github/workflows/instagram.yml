name: Generate Instagram Cards

on:
  schedule:
    # KST 00:10 = UTC 15:10 (전날)
    - cron: '10 15 * * *'
  workflow_dispatch: {}  # 수동 트리거

permissions:
  contents: write

jobs:
  instagram:
    runs-on: ubuntu-latest
    env:
      IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
      IG_PAGE_ACCESS_TOKEN: ${{ secrets.IG_PAGE_ACCESS_TOKEN }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - run: npm ci

      - name: ffmpeg 설치
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: 토큰 헬스체크
        run: npm run ig:check

      - name: 카드 생성
        run: npm run post:all -- --no-send

      - name: 릴스 영상 생성
        run: npm run reel:make

      - name: 스토리 이미지 생성
        run: npm run story:make

      - name: 이미지/영상을 insta-media 브랜치에 푸시
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd generated/instagram
          git init -q
          git checkout -q -b insta-media
          git add -A
          git -c user.email="github-actions[bot]@users.noreply.github.com" \
              -c user.name="github-actions[bot]" \
              commit -q -m "update $(date -u +%F)"
          git push -q -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:insta-media
          echo "✅ insta-media 브랜치 업데이트 완료"

      - name: raw.githubusercontent CDN 반영 대기
        run: sleep 10

      - name: 캐러셀 게시
        run: npm run post:ig

      - name: 릴스 게시
        run: npm run post:reel

      - name: 스토리 게시
        run: npm run post:story

      - name: 유튜브 쇼츠 업로드
        run: npm run post:youtube

      - name: Telegram 성공 알림
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="✅ 인스타 + 유튜브 쇼츠 게시 완료"

      - name: Telegram 실패 알림 + 카드 전송
        if: failure()
        run: npm run telegram:failure
