name: Generate Instagram Cards

on:
  schedule:
    # KST 00:10 = UTC 15:10 (전날)
    - cron: '10 15 * * *'
  workflow_dispatch: {}  # 수동 트리거

permissions:
  contents: write

jobs:
  instagram:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - run: npm ci

      - name: ffmpeg 설치
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: 토큰 헬스체크
        env:
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IG_PAGE_ACCESS_TOKEN: ${{ secrets.IG_PAGE_ACCESS_TOKEN }}
        run: npm run ig:check

      - name: 카드 생성 (텔레그램 전송 생략)
        run: npm run post:all -- --no-send

      - name: 릴스 영상 생성 (ffmpeg)
        run: npm run reel:make

      - name: 이미지/영상을 insta-media 브랜치에 푸시
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd generated/instagram
          git init -q
          git checkout -q -b insta-media
          git add -A
          git -c user.email="github-actions[bot]@users.noreply.github.com" \
              -c user.name="github-actions[bot]" \
              commit -q -m "update $(date -u +%F)"
          git push -q -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:insta-media
          echo "✅ insta-media 브랜치 업데이트 완료"

      - name: raw.githubusercontent CDN 반영 대기
        run: sleep 10

      - name: 인스타그램 캐러셀 게시
        env:
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IG_PAGE_ACCESS_TOKEN: ${{ secrets.IG_PAGE_ACCESS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run post:ig

      - name: 인스타그램 릴스 게시
        env:
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IG_PAGE_ACCESS_TOKEN: ${{ secrets.IG_PAGE_ACCESS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run post:reel

      - name: Telegram 실패 알림 + 카드 전송
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run telegram:failure
