<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 배경 원: 빨강 -->
  <circle cx="50" cy="50" r="50" fill="#D94E28"/>
  <!-- S자 곡선으로 남색 반 -->
  <path d="M50 0 A50 50 0 0 0 50 100 C50 100 50 75 50 50 A25 25 0 0 1 50 0" fill="#2B2D5B"/>
  <!-- 위쪽 작은 원: 빨강 (오른쪽 위) -->
  <circle cx="50" cy="25" r="25" fill="#D94E28"/>
  <!-- 아래쪽 작은 원: 남색 (왼쪽 아래) -->
  <circle cx="50" cy="75" r="25" fill="#2B2D5B"/>
</svg>
